<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-Frequency Cluster Synth (Extended)</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>
                <span class="dot" id="statusDot"></span>
                Micro-Cluster Synth
            </h1>
            <span class="status-tag" id="statusTag">Idle</span>
        </div>

        <div class="viz-container" id="vizContainer">
            <canvas id="vizCanvas"></canvas>
            <div class="viz-overlay" id="vizLabel">time domain</div>
        </div>

        <!-- Harmonic Series Toggle -->
        <div class="controls">
            <div class="control-group">
                <label>
                    <input type="checkbox" id="harmonicMode" class="toggle-checkbox">
                    <span class="toggle-label">Harmonic Series Mode</span>
                </label>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="baseFreq">Base Freq (Hz)</label>
                <input type="number" id="baseFreq" value="250" min="0.001" max="22050" step="0.001">
            </div>
            <div class="control-group flex-grow">
                <label for="stepSize">Step Size <span id="stepVal" class="val-display">0.01 Hz</span></label>
                <input type="range" id="stepSize" min="0" max="100" value="50" step="1">
            </div>
            <div class="control-group" style="flex:2;min-width:200px;">
                <label>Cluster Size</label>
                <div class="cluster-sizes" id="clusterButtons"></div>
            </div>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Waveform</label>
                <div class="waveform-select" id="waveformButtons">
                    <button class="wave-btn selected" data-wave="sine">Sine</button>
                    <button class="wave-btn" data-wave="triangle">Triangle</button>
                    <button class="wave-btn" data-wave="square">Square</button>
                    <button class="wave-btn" data-wave="sawtooth">Sawtooth</button>
                </div>
            </div>
            <div class="control-group volume-group">
                <label>Volume</label>
                <input type="range" id="volumeSlider" min="0" max="200" value="100" step="1">
                <div class="vol-label-row">
                    <span>0%</span>
                    <span id="volPercent">100%</span>
                    <span>200%</span>
                </div>
            </div>
        </div>

        <div class="controls tone-shaping">
            <div class="control-group flex-grow">
                <label for="filterCutoff">Filter Cutoff <span id="cutoffVal" class="val-display">20.0 kHz</span></label>
                <input type="range" id="filterCutoff" min="0" max="100" value="100" step="1">
            </div>
            <div class="control-group flex-grow">
                <label for="filterQ">Resonance (Q) <span id="qVal" class="val-display">0.1</span></label>
                <input type="range" id="filterQ" min="0" max="100" value="0" step="1">
            </div>
            <div class="control-group flex-grow">
                <label for="stereoSpread">Stereo Spread <span id="spreadVal" class="val-display">50%</span></label>
                <input type="range" id="stereoSpread" min="0" max="100" value="50" step="1">
            </div>
        </div>

        <div class="controls tone-shaping">
            <div class="control-group flex-grow">
                <label for="attackTime">Attack (s) <span id="attackVal" class="val-display">0.15</span></label>
                <input type="range" id="attackTime" min="0" max="100" value="15" step="1">
            </div>
            <div class="control-group flex-grow">
                <label for="releaseTime">Release (s) <span id="releaseVal" class="val-display">0.50</span></label>
                <input type="range" id="releaseTime" min="0" max="100" value="50" step="1">
            </div>
        </div>

        <div class="play-section">
            <button class="btn-play" id="btnPlay" disabled>▶ Play Cluster</button>
        </div>

        <div class="info-bar" id="infoBar">
            Cluster range: <span id="infoRange">—</span> &nbsp;|&nbsp;
            Spread: <span class="highlight" id="infoSpread">—</span> &nbsp;|&nbsp;
            Tones: <span id="infoCount">—</span>
        </div>

        <!-- Preset System UI -->
        <div class="controls">
            <div class="control-group" style="flex: 1; min-width: 100%;">
                <label>Presets</label>
                <div class="preset-controls">
                    <input type="text" id="presetName" placeholder="Preset Name" class="preset-input">
                    <button id="btnSavePreset" class="preset-btn">Save</button>
                    <button id="btnRandomize" class="preset-btn">Randomize</button>
                </div>
                <div class="preset-list" id="presetList"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
