<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#15151c">
    <meta name="color-scheme" content="dark">

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Micro-Cluster Synth">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <title>Micro-Cluster Synth</title>
    <meta name="description" content="Micro-frequency cluster synthesizer">

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="ios-install-banner" class="install-banner" hidden>
        <span>Install: Tap <strong>Share □↑</strong> then "Add to Home Screen"</span>
        <button id="dismiss-ios-banner" aria-label="Dismiss">×</button>
    </div>

    <div id="pwa-install-banner" class="install-banner" hidden>
        <span>Install Micro-Cluster Synth for offline use</span>
        <button id="install-pwa-btn" class="btn-install">Install</button>
        <button id="dismiss-pwa-banner" aria-label="Dismiss">×</button>
    </div>

    <main class="app">
        <!-- Header -->
        <header class="app-header">
            <div class="brand">
                <span class="status-dot" id="status-dot" aria-hidden="true"></span>
                <h1>Micro-Cluster Synth</h1>
            </div>
            <span class="status-badge" id="status-badge">IDLE</span>
        </header>

        <!-- Visualizer -->
        <section class="viz-panel" aria-label="Audio visualizer">
            <canvas id="visualizer"></canvas>
            <span class="viz-label">time domain</span>
        </section>

        <!-- Controls -->
        <section class="controls" aria-label="Synthesizer controls">

            <!-- Row 1: Base Freq, Step Size, Cluster Size -->
            <div class="control-row row-three">
                <div class="control-block">
                    <label class="control-label">BASE FREQ (HZ)</label>
                    <div class="number-input-wrap">
                        <input type="number" id="base-freq" min="0.01" max="22000" step="0.01" value="250" aria-label="Base frequency in Hertz">
                    </div>
                </div>

                <div class="control-block flex-grow">
                    <label class="control-label">STEP SIZE <span class="value-blue" id="step-val">0.001</span> <span class="unit">Hz</span></label>
                    <input type="range" id="step-size" min="0.00001" max="1" value="0.001" step="0.00001" aria-label="Step size">
                </div>

                <div class="control-block">
                    <label class="control-label">CLUSTER SIZE</label>
                    <div class="btn-group" id="cluster-size-group" role="radiogroup" aria-label="Cluster size">
                        <button class="pill-btn active" data-value="10" role="radio" aria-checked="true">10</button>
                        <button class="pill-btn" data-value="50" role="radio" aria-checked="false">50</button>
                        <button class="pill-btn" data-value="100" role="radio" aria-checked="false">100</button>
                        <button class="pill-btn" data-value="150" role="radio" aria-checked="false">150</button>
                        <button class="pill-btn" data-value="200" role="radio" aria-checked="false">200</button>
                        <button class="pill-btn" data-value="250" role="radio" aria-checked="false">250</button>
                        <button class="pill-btn" data-value="500" role="radio" aria-checked="false">500</button>
                        <button class="pill-btn" data-value="1000" role="radio" aria-checked="false">1000</button>
                    </div>
                </div>
            </div>

            <!-- Row 2: Waveform, Volume -->
            <div class="control-row row-two">
                <div class="control-block">
                    <label class="control-label">WAVEFORM</label>
                    <div class="btn-group" id="waveform-group" role="radiogroup" aria-label="Waveform">
                        <button class="pill-btn active" data-value="sine" role="radio" aria-checked="true">Sine</button>
                        <button class="pill-btn" data-value="triangle" role="radio" aria-checked="false">Triangle</button>
                        <button class="pill-btn" data-value="square" role="radio" aria-checked="false">Square</button>
                        <button class="pill-btn" data-value="sawtooth" role="radio" aria-checked="false">Sawtooth</button>
                    </div>
                </div>

                <div class="control-block flex-grow">
                    <label class="control-label">VOLUME</label>
                    <input type="range" id="volume" min="0" max="200" value="100" step="1" aria-label="Volume">
                    <div class="slider-ticks">
                        <span>0%</span>
                        <span id="volume-val">100%</span>
                        <span>200%</span>
                    </div>
                </div>
            </div>

            <!-- Divider -->
            <hr class="divider">

            <!-- Row 3: Filter Cutoff, Resonance, Stereo Spread -->
            <div class="control-row row-three">
                <div class="control-block">
                    <label class="control-label">FILTER CUTOFF <span class="value-blue" id="cutoff-val">20.0</span> <span class="unit">kHz</span></label>
                    <input type="range" id="filter-cutoff" min="20" max="20000" value="20000" step="10" aria-label="Filter cutoff frequency">
                </div>

                <div class="control-block">
                    <label class="control-label">RESONANCE (Q) <span class="value-blue" id="resonance-val">0.1</span></label>
                    <input type="range" id="resonance" min="0.1" max="20" value="0.1" step="0.1" aria-label="Filter resonance">
                </div>

                <div class="control-block">
                    <label class="control-label">STEREO SPREAD <span class="value-blue" id="stereo-val">50</span><span class="unit">%</span></label>
                    <input type="range" id="stereo-width" min="0" max="100" value="50" step="1" aria-label="Stereo spread">
                </div>
            </div>

            <!-- Row 4: Attack, Release -->
            <div class="control-row row-two">
                <div class="control-block">
                    <label class="control-label">ATTACK (S) <span class="value-blue" id="attack-val">0.01</span> <span class="unit">s</span></label>
                    <input type="range" id="attack-time" min="0.001" max="1" value="0.01" step="0.001" aria-label="Attack time">
                </div>

                <div class="control-block">
                    <label class="control-label">RELEASE (S) <span class="value-blue" id="release-val">0.22</span> <span class="unit">s</span></label>
                    <input type="range" id="release-time" min="0.001" max="1" value="0.22" step="0.001" aria-label="Release time">
                </div>
            </div>

            <!-- Play Button -->
            <div class="play-wrap">
                <button id="play-btn" class="play-btn" aria-label="Play cluster tone">
                    <span class="play-icon" aria-hidden="true">▶</span>
                    <span>Play Cluster</span>
                </button>
            </div>

            <!-- Status Bar -->
            <div class="status-bar" id="status-bar" aria-live="polite">
                <span>Cluster range: <strong id="range-min">250.001</strong> Hz → <strong id="range-max">250.010</strong> Hz</span>
                <span class="sep">|</span>
                <span>Spread: <strong class="value-blue" id="spread-val">0.0090</strong> Hz</span>
                <span class="sep">|</span>
                <span>Tones: <strong id="tones-val">10</strong> tones</span>
            </div>

        </section>
    </main>

    <!-- Toast -->
    <div id="toast-container" class="toast-container" aria-live="assertive" aria-atomic="true"></div>

    <!-- iOS Silent Audio -->
    <audio id="ios-silence-loop" loop preload="auto" playsinline crossorigin="anonymous" style="display:none;" aria-hidden="true">
        <source src="data:audio/wav;base64,UklGRjQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
    </audio>

    <script type="module" src="js/app.js"></script>
</body>
</html>
